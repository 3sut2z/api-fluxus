<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Bypass Key Fluxus</h1>
        <input type="text" id="urlInput" placeholder="Enter Link Get Key Fluxus...">
        <strong id="keyDisplay"> </strong>
        <div id="result"></div>
    </div>
    <script>
        function fetchKeys() {
            // Base URL and API key
            const apiBaseUrl = "https://stickx.top/api-fluxus/?hwid=";
            const apiKey = "&api_key=E99l9NOctud3vmu6bPne";

            // Get URL input value
            const urlInput = document.getElementById("urlInput").value.trim();

            // Extract HWID from URL
            const hwidStartIndex = urlInput.indexOf("HWID=") + 5;
            const hwid = urlInput.substring(hwidStartIndex);

            // Make the API request to the original base URL
            fetch(apiBaseUrl + hwid + apiKey)
                .then(response => response.json())
                .then(data => {
                    const keyDisplay = document.getElementById("keyDisplay");
                    keyDisplay.innerHTML = `{"Key:" <strong>${data.key}</strong>}`;
                })
                .catch(error => {
                    console.error('Error fetching key:', error);
                    const keyDisplay = document.getElementById("keyDisplay");
                    keyDisplay.innerHTML = `{"Error:" <strong>Failed to fetch key. Please check the URL and try again.</strong>}`;
                });
        }

        // Trigger fetchKeys function on Enter key press
        document.getElementById("urlInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                fetchKeys();
            }
        });
    </script>
</body>
</html>
