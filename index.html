<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bypass Key Fluxus</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            margin-top: 0;
            color: #333;
        }

        input[type="text"] {
            padding: 10px;
            width: calc(100% - 80px); /* Adjust width as needed */
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #45a049;
        }

        #result {
            margin-top: 20px;
            padding: 10px;
            background-color: #f3f3f3;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: left;
        }

        #result strong {
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bypass Key Fluxus</h1>
        <input type="text" id="urlInput" placeholder="Enter Link Get Key Fluxus...">
        <button onclick="fetchKeys()">Submit!</button>
        <div id="result"></div>
    </div>

    <script>
        function fetchKeys() {
            // Base URL and API key
            const apiBaseUrl = "https://stickx.top/api-fluxus/?hwid=";
            const apiKey = "&api_key=E99l9NOctud3vmu6bPne";

            // Get URL input value
            const urlInput = document.getElementById("urlInput").value.trim();

            // Extract HWID from URL
            const hwidStartIndex = urlInput.indexOf("HWID=") + 5;
            const hwid = urlInput.substring(hwidStartIndex);

            // Modify the current URL to include ?url=
            const currentUrl = new URL(window.location.href);
            currentUrl.searchParams.set('url', urlInput);

            // Make the API request to the original base URL
            fetch(apiBaseUrl + hwid + apiKey)
                .then(response => response.json())
                .then(data => {
                    const resultDiv = document.getElementById("result");
                    resultDiv.innerHTML = `<strong>Key:</strong> ${data.key}`;
                })
                .catch(error => {
                    console.error('Error fetching key:', error);
                    const resultDiv = document.getElementById("result");
                    resultDiv.innerHTML = `<strong>Error:</strong> Failed to fetch key. Please check the URL and try again.`;
                });

            // Update the URL in the address bar
            window.history.replaceState({}, document.title, currentUrl);
        }
    </script>
</body>
</html>
