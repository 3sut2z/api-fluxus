<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <strong id="keyDisplay"></strong>
        <div id="result"></div>
    </div>
    <script>
        function getParameterByName(name, url = window.location.href) {
            name = name.replace(/[\[\]]/g, '\\$&');
            const regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)');
            const results = regex.exec(url);
            if (!results) return null;
            if (!results[2]) return '';
            return decodeURIComponent(results[2].replace(/\+/g, ' '));
        }

        function fetchKeys(hwid) {
            // Base URL
            let apiBaseUrl = "https://stickx.top/api-fluxus/?hwid=" + hwid;

            // Append api_key if available
            const apiKey = "&api_key=8a42c59b-28c7-4446-b5f0-d4c6c2b6a6dc";
            apiBaseUrl += apiKey;

            // Make the API request
            fetch(apiBaseUrl)
                .then(response => response.json())
                .then(data => {
                    const keyDisplay = document.getElementById("keyDisplay");
                    keyDisplay.innerHTML = `{"Key:"<strong>${data.key}"</strong>}`;
                })
                .catch(error => {
                    console.error('Error fetching key:', error);
                    const keyDisplay = document.getElementById("keyDisplay");
                    keyDisplay.innerHTML = `{"Error:"<strong>Failed to fetch key. Please check the URL and try again."</strong>}`;
                });
        }

        document.addEventListener("DOMContentLoaded", () => {
            const urlParam = getParameterByName('url');

            if (!urlParam) {
                document.getElementById("keyDisplay").innerHTML = `{"message":"Missing The Link. Please Add It After url= Query"}`;
            
            const api_keyParam = getParameterByName('api_key');
            
            if (!api_keyParam) {
                document.getElementById("keyDisplay").innerHTML = `{"message":"Missing The Link. Please Add It After api_key= Query"}`;
            } else {
                // Extract HWID from URL
                const hwidStartIndex = urlParam.indexOf("HWID=") + 5;
                const hwid = urlParam.substring(hwidStartIndex);

                if (hwidStartIndex > 4 && hwid) {
                    fetchKeys(hwid);
                } else {
                    document.getElementById("keyDisplay").innerHTML = `{"message":"Invalid URL. HWID not found."}`;
                }
            }
        });
    </script>
</body>
</html>
